name: ci-smoke

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Syntax compile check
        run: python -m py_compile askllm scripts/devdocs_scraper.py

      - name: CLI help smoke checks
        run: |
          ./askllm --help >/dev/null
          ./scripts/setup.sh --help >/dev/null
          ./scripts/install-shell-extension.sh --help >/dev/null
